# separate terms of service, privacy policy, and support
# documentation.

name: Elixir CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    # env:
    #   MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      # 它会自动读取 mise.toml 并安装对应的 Elixir / Erlang 版本
      - name: Setup Elixir via mise
        uses: jdx/mise-action@v2
        with:
          # 开启 mise 自带的工具缓存（加速后续构建）
          cache: true 

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get --only test

      - name: Run tests
        run: mix test


